# Docker Compose для MCP-сервера 1С:Напарник
# Оригинальная идея: https://github.com/comol/1c-code-checker
# Алгоритмы API: https://github.com/SteelMorgan/spring-mcp-1c-copilot

services:
  1c-ai-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1c-ai-mcp
    ports:
      - "8007:8007"
    environment:
      ONEC_AI_TOKEN: "${ONEC_AI_TOKEN}"
      ONEC_AI_TOKEN_FILE: ""
      ONEC_AI_BASE_URL: "https://code.1c.ai"
      ONEC_AI_TIMEOUT: "120"
      ONEC_AI_SKILL_NAME: "raw"
      ONEC_AI_AUTH_FORMAT: "plain"
      HTTP_PORT: "8007"
      USESSE: "false"
      MAX_ACTIVE_SESSIONS: "10"
      SESSION_TTL: "3600"
      MCP_TOOL_CALL_MODE: "standard"
      ONEC_AI_INPUT_MAX_LENGTH: "100000"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8007),2); s.close()\""]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
